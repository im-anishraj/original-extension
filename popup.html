<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-width: 320px;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 0;
      overflow: hidden;
    }

    .popup-container {
      position: relative;
      padding: 24px 20px 20px;
      background: linear-gradient(145deg, #13132b 0%, #0f0f1a 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Glow effect at top */
    .popup-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #6c5ce7, #a29bfe, #6c5ce7, transparent);
      border-radius: 0 0 4px 4px;
      opacity: 0.8;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      color: #7f8c9b;
      margin-top: 2px;
      font-weight: 400;
    }

    /* Status Card */
    .status-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
    }

    .status-card.active {
      background: rgba(108, 92, 231, 0.08);
      border-color: rgba(108, 92, 231, 0.2);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 11px;
      color: #7f8c9b;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4757;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .status-dot.active {
      background: #2ed573;
      box-shadow: 0 0 10px rgba(46, 213, 115, 0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 6px rgba(46, 213, 115, 0.3); }
      50% { box-shadow: 0 0 14px rgba(46, 213, 115, 0.6); }
    }

    .status-text {
      font-size: 12px;
      font-weight: 600;
      color: #ff4757;
      transition: color 0.3s ease;
    }

    .status-text.active {
      color: #2ed573;
    }

    .site-name {
      font-size: 13px;
      color: #c8d6e5;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      word-break: break-all;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .site-name .icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    /* Timer Section */
    .timer-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      text-align: center;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .timer-section.visible {
      opacity: 1;
      max-height: 150px;
      padding: 16px;
    }

    .timer-label {
      font-size: 10px;
      color: #7f8c9b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .timer-display {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      letter-spacing: 2px;
    }

    .timer-sub {
      font-size: 10px;
      color: #576574;
      margin-top: 4px;
      font-weight: 400;
    }

    /* Toggle Button */
    #toggleBtn {
      width: 100%;
      padding: 13px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    #toggleBtn.enable {
      background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
    }

    #toggleBtn.enable:hover {
      box-shadow: 0 6px 25px rgba(108, 92, 231, 0.45);
      transform: translateY(-1px);
    }

    #toggleBtn.disable {
      background: rgba(255, 71, 87, 0.12);
      color: #ff4757;
      border: 1px solid rgba(255, 71, 87, 0.2);
    }

    #toggleBtn.disable:hover {
      background: rgba(255, 71, 87, 0.2);
      transform: translateY(-1px);
    }

    #toggleBtn:active {
      transform: translateY(0);
    }

    /* Shimmer animation on button */
    #toggleBtn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
    }

    #toggleBtn:hover::after {
      left: 100%;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 10px;
      color: #3d3d56;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(108, 92, 231, 0.15);
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Fade in animation */
    .content {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🛡️</div>
      <div class="header-text">
        <h1>Copy Paste Blocker</h1>
        <p id="headerSub">Manage site restrictions</p>
      </div>
    </div>

    <div id="loadingState" class="loading">
      <div class="loading-spinner"></div>
    </div>

    <div id="contentArea" class="content" style="display: none;">
      <!-- Status Card -->
      <div class="status-card" id="statusCard">
        <div class="status-row">
          <span class="status-label">Protection</span>
          <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Inactive</span>
          </div>
        </div>
        <div class="site-name">
          <span class="icon">🌐</span>
          <span id="siteName">—</span>
        </div>
      </div>

      <!-- Timer Section -->
      <div class="timer-section" id="timerSection">
        <div class="timer-label">Session Duration</div>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-sub" id="timerSub">Blocking active since activation</div>
      </div>

      <!-- Toggle Button -->
      <button id="toggleBtn" class="enable">Enable Protection</button>
    </div>

    <div class="footer">Disable Copy Paste v1.1</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
